{{- define "attendance-service.labels" -}}
app: attendance
{{- end }}
---
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: attendance-rollout
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels: {app: attendance}
  template:
    metadata:
      labels: {app: attendance}
    spec:
      containers:
        - name: attendance-cont
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          envFrom:
            - configMapRef: {name: attendance-config}
            - secretRef: {name: attendance-secret}
  strategy:
    blueGreen: 
      activeService: attendance-svc
      previewService: attendance-svc-preview
---
apiVersion: v1
kind: Service
metadata: {name: attendance-svc}
spec:
  ports: [{port: 3004, targetPort: 3004}]
  selector: {app: attendance}
---
apiVersion: v1
kind: Service
metadata: {name: attendance-svc-preview}
spec:
  ports: [{port: 3004, targetPort: 3004}]
  selector: {app: attendance}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: attendance-config
data:
  PORT: "3004"
  NODE_ENV: "production"
---
apiVersion: v1
kind: Secret
metadata:
  name: attendance-secret
type: Opaque
stringData:
  MONGO_URI: {{ .Values.global.mongo.uri | quote }}
  JWT_SECRET: {{ .Values.global.jwtSecret | quote }}
